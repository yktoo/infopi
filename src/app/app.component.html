<section id="app">
    <!-- Clock -->
    @if (config.clock.enabled) {
        <app-clock/>
    }

    <!-- Weather -->
    @if (config.weather.enabled) {
        <app-weather/>
    }

    <div class="row flex-start ruler">
        <div class="w-6 pl-1 pr-2">
            <!-- Train schedule -->
            @if (config.trainSchedule.enabled) {
                <app-train/>
            }
        </div>
        <div class="w-6 pl-2 pr-1">
            <!-- RSS feed -->
            @if (config.rssFeed.enabled) {
                <app-news/>
            }
        </div>
    </div>

    <!-- Home automation -->
    @if (config.homeAutomation.enabled) {
        <div class="fixed-bottom opaque ruler-top pb-2">
            <div class="row flex-start flex-justify-center">
                <app-domotics/>
            </div>
        </div>
    }
</section>
