<section id="app">
    <!-- Clock -->
    @if (config.clock.enabled) {
        <app-clock [config]="config.clock"/>
    }

    <!-- Weather -->
    @if (config.weather.enabled) {
        <app-weather [config]="config.weather"/>
    }

    <div class="row flex-start ruler">
        <div class="w-6 pl-1 pr-2">
            <!-- Train schedule -->
            @if (config.trainSchedule.enabled) {
                <app-train [config]="config.trainSchedule"/>
            }
        </div>
        <div class="w-6 pl-2 pr-1">
            <!-- Waste collection schedule -->
            @if (config.wasteSchedule.enabled) {
                <app-waste-schedule [config]="config.wasteSchedule"/>
            }

            <!-- RSS feed -->
            @if (config.rssFeed.enabled) {
                <app-news [config]="config.rssFeed"/>
            }
        </div>
    </div>

    <!-- Home automation -->
    @if (config.homeAutomation.enabled) {
        <div class="fixed-bottom opaque ruler-top pb-2">
            <div class="row flex-start flex-justify-center">
                <app-home-automation/>
            </div>
        </div>
    }
</section>
